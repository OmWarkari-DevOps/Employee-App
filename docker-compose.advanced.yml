version: '3.8'

# Advanced 3-Tier Architecture with Backend & Database
# This is a future-ready setup for when you add a real backend

services:
  # Frontend - React/HTML UI
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: employee-frontend
    ports:
      - "8000:8000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
      - NODE_ENV=production
    depends_on:
      - backend
    volumes:
      - ./:/app
    restart: unless-stopped
    networks:
      - employee-network

  # Backend API (placeholder - add Node.js/Express backend later)
  backend:
    image: node:18-alpine
    container_name: employee-backend
    working_dir: /app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_USER=employee_user
      - DB_PASSWORD=secure_password_123
      - DB_NAME=employee_db
    volumes:
      - ./backend:/app
    command: npm start
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - employee-network

  # PostgreSQL Database (optional - for future use)
  postgres:
    image: postgres:15-alpine
    container_name: employee-db
    environment:
      - POSTGRES_USER=employee_user
      - POSTGRES_PASSWORD=secure_password_123
      - POSTGRES_DB=employee_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - employee-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employee_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: employee-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@employee.local
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - employee-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  employee-network:
    driver: bridge
