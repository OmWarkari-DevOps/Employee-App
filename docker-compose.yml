version: '3.8'

services:
  # Main Employee Management System
  employee-app:
    build: .
    container_name: employee-app
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  app_data:
