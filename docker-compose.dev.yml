version: '3.8'

# Development setup with hot-reload and live editing
services:
  employee-app-dev:
    build: .
    container_name: employee-app-dev
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./:/app  # Mount entire project directory for hot-reload
      - /app/node_modules  # Don't override node_modules
    restart: unless-stopped
    command: http-server -p 8000 -c-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
